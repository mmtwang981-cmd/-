name: Cron Send Love Mail

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call production cron endpoint
        env:
          CRON_ENDPOINT_URL: ${{ secrets.CRON_ENDPOINT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_ENDPOINT_URL" ]; then
            echo "CRON_ENDPOINT_URL is not set"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set"
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_ENDPOINT_URL/api/cron/send-love-mail"
